[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate"]
  timeout = 60

[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

[[redirects]]
  from = "/api/export-word"
  to = "/.netlify/functions/export-word"
  status = 200

[[redirects]]
  from = "/api/export-drive"
  to = "/.netlify/functions/export-drive"
  status = 200
